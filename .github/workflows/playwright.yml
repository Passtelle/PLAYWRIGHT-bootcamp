name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test tests/bootcamp/day32_securebank_e2e.spec.ts
      env:
        PARABANK_USERNAME: ${{ secrets.PARABANK_USERNAME }}
        PARABANK_PASSWORD: ${{ secrets.PARABANK_PASSWORD }}
    - name: Upload results to Xray
      if: always()
      run: |
        token=$(curl -s -H "Content-Type: application/json" \
          -X POST \
          --data "{\"client_id\":\"${{ secrets.XRAY_CLIENT_ID }}\",\"client_secret\":\"${{ secrets.XRAY_CLIENT_SECRET }}\"}" \
          https://xray.cloud.getxray.app/api/v2/authenticate | tr -d '"')
        curl -s -H "Content-Type: text/xml" \
          -H "Authorization: Bearer ${token}" \
          --data @test-results/results.xml \
          "https://xray.cloud.getxray.app/api/v2/import/execution/junit?projectKey=BAS"
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
